name: Generate All (manual)

on:
  workflow_dispatch:
    inputs:
      max_plugins:
        description: "Max number of plugins to process (avoids rate limits in one go)"
        required: false
        default: "1000"
      start_from:
        description: "Start processing from this plugin name (skips alphabetical plugins before it)"
        required: false
        default: ""
      plugin_names:
        description: "Comma-separated list of plugins to process"
        required: false
        default: ""

jobs:
  generate-index:
    uses: ./.github/workflows/generate-plugin-index.yml
    secrets: inherit
    with:
      max_plugins: ${{ github.event.inputs.max_plugins || '1000' }}
      start_from: ${{ github.event.inputs.start_from || '' }}
      plugin_names: ${{ github.event.inputs.plugin_names || '' }}

  generate-discussions:
    needs: generate-index
    uses: ./.github/workflows/generate-plugin-discussions.yml
    secrets: inherit
    with:
      max_plugins: ${{ github.event.inputs.max_plugins || '1000' }}
      start_from: ${{ github.event.inputs.start_from || '' }}
      plugin_names: ${{ github.event.inputs.plugin_names || '' }}
