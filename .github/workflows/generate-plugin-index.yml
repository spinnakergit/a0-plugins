name: Generate Plugin Index

concurrency:
  group: index-release-publisher
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      max_plugins:
        type: string
        required: false
        default: "1000"
      start_from:
        type: string
        required: false
        default: ""
      plugin_names:
        type: string
        required: false
        default: ""
      before_sha:
        type: string
        required: false
        default: ""
      after_sha:
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      max_plugins:
        description: "Max number of plugins to process (avoids rate limits in one go)"
        required: false
        default: "1000"
      start_from:
        description: "Start processing from this plugin name (skips alphabetical plugins before it)"
        required: false
        default: ""
      plugin_names:
        description: "Comma-separated list of plugins to process (overrides SHAs)"
        required: false
        default: ""
      before_sha:
        description: "Git diff start SHA (leave empty to process all)"
        required: false
        default: ""
      after_sha:
        description: "Git diff end SHA (leave empty to process all)"
        required: false
        default: ""

permissions:
  contents: write
  discussions: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Download current index.json (best effort)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.A0_GITHUB_TOKEN || github.token }}
          INDEX_RELEASE_TAG: generated-index
        run: |
          python scripts/download_index_release.py

      - name: Generate index (all plugins)
        env:
          GITHUB_TOKEN: ${{ secrets.A0_GITHUB_TOKEN || github.token }}
          MAX_PLUGINS: ${{ inputs.max_plugins || github.event.inputs.max_plugins || '1000' }}
          START_FROM: ${{ inputs.start_from || github.event.inputs.start_from || '' }}
          PLUGIN_NAMES: ${{ inputs.plugin_names || github.event.inputs.plugin_names || '' }}
          BEFORE_SHA: ${{ inputs.before_sha || github.event.inputs.before_sha || '' }}
          AFTER_SHA: ${{ inputs.after_sha || github.event.inputs.after_sha || '' }}
        run: |
          python scripts/generate_index.py

      - name: Publish index.json to Release (replace asset)
        env:
          GITHUB_TOKEN: ${{ secrets.A0_GITHUB_TOKEN || github.token }}
          INDEX_RELEASE_TAG: generated-index
        run: |
          python scripts/publish_index_release.py
